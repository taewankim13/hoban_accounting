<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전표 생성 - 호반건설 FDS</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* 상단 AI 패널 */
        .ai-panel { display:grid; grid-template-columns:280px 1fr; gap:16px; margin-bottom:20px; align-items:stretch; }
        .ai-panel > .card { display:flex; flex-direction:column; padding:16px; margin-bottom:0; }
        .upload-zone { border:2px dashed var(--gray-300); border-radius:10px; padding:16px; text-align:center; cursor:pointer; transition:all 0.2s; background:var(--gray-50); flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:0; }
        .upload-zone:hover,.upload-zone.dragover { border-color:var(--hoban-orange); background:#FFF7ED; }
        .upload-zone input[type=file] { display:none; }
        .receipt-preview { max-width:120px; max-height:100px; border-radius:6px; margin-top:6px; border:1px solid var(--gray-200); }
        .ocr-result { background:#E8F5E9; border:1px solid #C8E6C9; border-radius:6px; padding:8px 10px; margin-top:6px; font-size:12px; }

        /* 챗 */
        .chat-compact { display:flex; flex-direction:column; flex:1; min-height:0; }
        .chat-compact .chat-box { flex:1; height:auto; min-height:0; overflow-y:auto; border-radius:10px; padding:12px; font-size:13px; margin-bottom:8px; }
        .chat-compact .chat-msg { padding:8px 12px; margin-bottom:8px; font-size:13px; border-radius:12px; max-width:85%; }

        /* 전표 메인 폼 */
        .slip-form { background:white; border-radius:16px; box-shadow:0 2px 8px rgba(87,85,83,0.08); border:1px solid rgba(0,0,0,0.04); }
        .slip-header { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; padding:20px 24px; border-bottom:1px solid var(--gray-200); }
        .slip-header .form-group { margin-bottom:0; }
        .slip-header .form-group label { font-size:11px; font-weight:600; color:var(--gray-500); text-transform:uppercase; margin-bottom:3px; }
        .slip-header .form-group input,.slip-header .form-group select { padding:7px 10px; font-size:13px; }
        .slip-header .span2 { grid-column:span 2; }
        .slip-header .span3 { grid-column:span 3; }

        /* 거래처 + 적요 영역 */
        .slip-middle { display:grid; grid-template-columns:1fr 1fr 2fr; gap:10px; padding:12px 24px; border-bottom:1px solid var(--gray-200); background:var(--gray-50); }

        /* 전표 항목 테이블 */
        .slip-table-wrap { padding:0; }
        .slip-table { width:100%; border-collapse:collapse; font-size:13px; }
        .slip-table th { background:var(--hoban-dark); color:white; padding:9px 12px; text-align:left; font-size:12px; font-weight:500; position:sticky; top:0; }
        .slip-table td { padding:6px 8px; border-bottom:1px solid var(--gray-100); }
        .slip-table tbody tr:hover { background:#FFF7ED; }
        .slip-table input,.slip-table select { width:100%; padding:5px 8px; border:1px solid var(--gray-200); border-radius:4px; font-size:13px; }
        .slip-table input:focus,.slip-table select:focus { border-color:var(--hoban-orange); outline:none; }
        .slip-table .amt { text-align:right; font-variant-numeric:tabular-nums; }
        .slip-table tfoot td { background:var(--gray-50); font-weight:700; padding:10px 12px; }

        /* 검색 드롭다운 */
        .search-input-wrap { position:relative; }
        .search-input-wrap input { width:100%; }
        .search-dropdown { position:absolute; top:100%; left:0; right:0; background:white; border:1px solid var(--gray-300); border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,0.12); max-height:200px; overflow-y:auto; z-index:50; display:none; }
        .search-dropdown.show { display:block; }
        .search-dropdown .search-item { padding:8px 12px; cursor:pointer; font-size:13px; border-bottom:1px solid var(--gray-50); display:flex; justify-content:space-between; }
        .search-dropdown .search-item:hover { background:#FFF7ED; }
        .search-dropdown .search-item .code { color:var(--gray-500); font-size:12px; font-family:monospace; }
        .search-dropdown .search-item .name { font-weight:500; }
        .search-dropdown .no-result { padding:12px; text-align:center; color:var(--gray-500); font-size:13px; }

        /* 로딩 스피너 */
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 하단 버튼 */
        .slip-footer { padding:16px 24px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--gray-200); }

        @media(max-width:1024px) { .ai-panel{grid-template-columns:1fr} .slip-header{grid-template-columns:repeat(3,1fr)} }
    </style>
</head>
<body>
    <header class="navbar">
        <a href="/" class="logo"><img src="/static/hoban_logo.png" alt="HOBAN"><div class="divider"></div><span class="app-name">전표 이상탐지</span><span class="app-badge">FDS</span></a>
        <nav>
            <a href="/">대시보드</a>
            <a href="/create" class="active">전표 생성</a>
            <a href="/review">전표 검토</a>
            <a href="/rules">룰 관리</a>
        </nav>
    </header>

    <div class="container">
        <div class="page-header">
            <h1>전표 생성</h1>
            <p>AI 챗 또는 영수증 업로드로 전표를 생성하거나, 직접 입력합니다</p>
        </div>

        <!-- ────── 상단: AI 패널 (영수증 + 챗) ────── -->
        <div class="ai-panel">
            <!-- 영수증 업로드 -->
            <div class="card" style="padding:16px; margin-bottom:0">
                <div style="font-size:14px; font-weight:600; margin-bottom:8px; color:var(--hoban-dark)">영수증 업로드</div>
                <div class="upload-zone" id="uploadZone" onclick="document.getElementById('receiptFile').click()">
                    <input type="file" id="receiptFile" accept="image/*" onchange="uploadReceipt(this)">
                    <div style="font-size:24px; color:var(--gray-400)">+</div>
                    <p style="color:var(--gray-500); font-size:12px; margin:4px 0">클릭 또는 드래그</p>
                </div>
                <div id="receiptResult" style="display:none"></div>
            </div>

            <!-- AI 챗 -->
            <div class="card" style="padding:16px; margin-bottom:0">
                <div style="font-size:14px; font-weight:600; margin-bottom:8px; color:var(--hoban-dark)">
                    AI 전표 어시스턴트
                    <span id="llmBadge" style="font-size:10px; background:var(--gray-100); color:var(--gray-500); padding:1px 6px; border-radius:8px; margin-left:4px">Local</span>
                </div>
                <div class="chat-compact">
                    <div class="chat-box" id="chatBox">
                        <div class="chat-msg ai" style="font-size:12px">
                            자연어로 전표를 생성하거나 수정할 수 있습니다.
                            <div class="suggestions" style="margin-top:6px">
                                <button onclick="sendChat('자재 구매 500만원')">자재 구매 500만원</button>
                                <button onclick="sendChat('외주비 1000만원')">외주비 1000만원</button>
                                <button onclick="sendChat('부가세 분리해줘')">부가세 분리</button>
                            </div>
                        </div>
                    </div>
                    <div class="chat-input">
                        <input type="text" id="chatInput" placeholder="예: 자재 구매 500만원 / 금액을 1155만원으로 수정해줘" onkeypress="if(event.key==='Enter') sendChat()" style="font-size:13px; padding:10px 16px">
                        <button class="btn btn-primary btn-sm" onclick="sendChat()">전송</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ────── 메인: 전표 입력 폼 ────── -->
        <div class="slip-form">
            <!-- 헤더 필드 -->
            <div class="slip-header">
                <div class="form-group">
                    <label>회계연도</label>
                    <input type="text" id="fiscalYear" value="2026" readonly style="background:var(--gray-50)">
                </div>
                <div class="form-group">
                    <label>전표일자</label>
                    <input type="date" id="docDate" value="2026-06-23">
                </div>
                <div class="form-group">
                    <label>전표유형</label>
                    <select id="docType">
                        <option>대체전표</option>
                        <option>법인카드 집행</option>
                        <option>XML세금계산서전표발행</option>
                        <option>원안품의(기안) 자동전표</option>
                        <option>수기전표</option>
                        <option>자금입금전표</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>구분</label>
                    <select id="category">
                        <option>손익</option>
                        <option>부채</option>
                        <option>자산</option>
                        <option>자본</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>대분류</label>
                    <select id="bigCategory">
                        <option>매출원가</option>
                        <option>유동부채</option>
                        <option>유동자산</option>
                        <option>영업외수익</option>
                        <option>영업외비용</option>
                        <option>비유동자산</option>
                        <option>매출</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>입력자</label>
                    <select id="createdBy">
                        {% for name, dept in employees %}
                        <option value="{{ name }}" data-dept="{{ dept }}">{{ name }} ({{ dept }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- 거래처 + 프로젝트 + 적요 -->
            <div class="slip-middle" style="grid-template-columns:1fr 120px 1fr 2fr">
                <div class="form-group" style="margin-bottom:0">
                    <label style="font-size:11px; font-weight:600; color:var(--gray-500)">프로젝트(현장)</label>
                    <div class="search-input-wrap">
                        <input type="text" id="projectSearch" placeholder="프로젝트 검색..." autocomplete="off"
                               oninput="searchField('project', this.value)" onfocus="searchField('project', this.value)">
                        <input type="hidden" id="projectId">
                        <div class="search-dropdown" id="projectDropdown"></div>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:0">
                    <label style="font-size:11px; font-weight:600; color:var(--gray-500)">거래처유형</label>
                    <select id="vendorType" style="padding:7px 10px;font-size:13px;border:1px solid var(--gray-300);border-radius:6px">
                        <option value="">선택</option>
                        <option value="F">법인(F)</option>
                        <option value="P">개인(P)</option>
                        <option value="D">부서(D)</option>
                        <option value="S">사원(S)</option>
                        <option value="X">기타(X)</option>
                        <option value="B">은행(B)</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:0">
                    <label style="font-size:11px; font-weight:600; color:var(--gray-500)">거래처</label>
                    <div class="search-input-wrap">
                        <input type="text" id="vendorSearch" placeholder="거래처 검색..." autocomplete="off"
                               oninput="searchField('vendor', this.value)" onfocus="searchField('vendor', this.value)">
                        <input type="hidden" id="vendorCode">
                        <div class="search-dropdown" id="vendorDropdown"></div>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:0">
                    <label style="font-size:11px; font-weight:600; color:var(--gray-500)">적요</label>
                    <input type="text" id="description" placeholder="거래 내용을 입력하세요">
                </div>
            </div>

            <!-- 전표 항목 테이블 -->
            <div class="slip-table-wrap">
                <table class="slip-table">
                    <thead>
                        <tr>
                            <th style="width:5%">No</th>
                            <th style="width:8%">차대구분</th>
                            <th style="width:25%">계정과목</th>
                            <th style="width:15%">차변금액</th>
                            <th style="width:15%">대변금액</th>
                            <th style="width:25%">적요</th>
                            <th style="width:4%"></th>
                        </tr>
                    </thead>
                    <tbody id="linesBody">
                        <tr>
                            <td style="text-align:center; color:var(--gray-500)">1</td>
                            <td><select class="side-select"><option>차변</option><option>대변</option></select></td>
                            <td><div class="search-input-wrap"><input type="text" class="acct-search" placeholder="계정 검색..." autocomplete="off" oninput="searchAccount(this)" onfocus="searchAccount(this)"><input type="hidden" class="acct-code"><div class="search-dropdown acct-dropdown"></div></div></td>
                            <td><input type="text" class="amt debit-input" placeholder="0" oninput="formatAmount(this);updateTotal()"></td>
                            <td><input type="text" class="amt credit-input" placeholder="0" oninput="formatAmount(this);updateTotal()"></td>
                            <td><input type="text" class="line-desc" placeholder="항목별 적요 (선택)"></td>
                            <td><button class="btn btn-sm btn-outline" onclick="removeLine(this)" style="padding:3px 7px; font-size:12px">X</button></td>
                        </tr>
                        <tr>
                            <td style="text-align:center; color:var(--gray-500)">2</td>
                            <td><select class="side-select"><option>차변</option><option selected>대변</option></select></td>
                            <td><div class="search-input-wrap"><input type="text" class="acct-search" placeholder="계정 검색..." autocomplete="off" oninput="searchAccount(this)" onfocus="searchAccount(this)"><input type="hidden" class="acct-code"><div class="search-dropdown acct-dropdown"></div></div></td>
                            <td><input type="text" class="amt debit-input" placeholder="0" oninput="formatAmount(this);updateTotal()"></td>
                            <td><input type="text" class="amt credit-input" placeholder="0" oninput="formatAmount(this);updateTotal()"></td>
                            <td><input type="text" class="line-desc" placeholder="항목별 적요 (선택)"></td>
                            <td><button class="btn btn-sm btn-outline" onclick="removeLine(this)" style="padding:3px 7px; font-size:12px">X</button></td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="3" style="text-align:right">합계</td>
                            <td id="totalDebit" class="amt" style="font-weight:700">0</td>
                            <td id="totalCredit" class="amt" style="font-weight:700">0</td>
                            <td id="balanceStatus" class="balance-ok">-</td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <!-- 하단 버튼 -->
            <div class="slip-footer">
                <button class="btn btn-outline btn-sm" onclick="addLine()">+ 항목 추가</button>
                <div style="display:flex; gap:8px">
                    <button class="btn btn-outline" onclick="clearForm()">초기화</button>
                    <button class="btn btn-primary" onclick="submitJournal()">전표 저장</button>
                </div>
            </div>
        </div>

        <!-- AI 분석 결과 -->
        <div id="aiResult" class="ai-result" style="display:none; margin-top:16px;"></div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
    const accounts = {{ accounts | tojson }};
    let currentReceiptUrl = null;
    let chatHistory = [];
    let searchDebounce = null;
    // OCR 파싱 결과 저장
    let ocrData = { date: null, vendor: null, amount: null, raw: null };

    // ══════ 검색형 입력 ══════

    async function searchField(type, query) {
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(async () => {
            const url = `/api/search/${type === 'project' ? 'projects' : 'vendors'}?q=${encodeURIComponent(query)}`;
            const res = await fetch(url);
            const items = await res.json();
            const dd = document.getElementById(`${type === 'project' ? 'project' : 'vendor'}Dropdown`);
            if (items.length === 0) {
                dd.innerHTML = '<div class="no-result">검색 결과 없음</div>';
            } else {
                dd.innerHTML = items.map(item => {
                    const typeBadge = item.type_name ? `<span style="font-size:10px;background:var(--gray-100);padding:1px 5px;border-radius:4px;margin-right:4px">${item.type_name}</span>` : '';
                    return `<div class="search-item" onclick="selectField('${type}', '${item.id || item.code}', '${item.name.replace(/'/g,"\\'")}', '${item.code || ''}', '${item.type || ''}')">
                        <span class="name">${typeBadge}${item.name}</span>
                        <span class="code">${item.code || ''}</span>
                    </div>`;
                }).join('');
            }
            dd.classList.add('show');
        }, 200);
    }

    function selectField(type, id, name, code, vendorTypeCode) {
        if (type === 'project') {
            document.getElementById('projectSearch').value = name;
            document.getElementById('projectId').value = id;
            document.getElementById('projectDropdown').classList.remove('show');
        } else {
            document.getElementById('vendorSearch').value = name;
            document.getElementById('vendorCode').value = code;
            document.getElementById('vendorDropdown').classList.remove('show');
            if (vendorTypeCode) document.getElementById('vendorType').value = vendorTypeCode;
        }
    }

    async function searchAccount(input) {
        const q = input.value.trim();
        const dd = input.parentElement.querySelector('.acct-dropdown');
        clearTimeout(input._debounce);
        input._debounce = setTimeout(async () => {
            const res = await fetch(`/api/search/accounts?q=${encodeURIComponent(q)}`);
            const items = await res.json();
            if (items.length === 0) {
                dd.innerHTML = '<div class="no-result">검색 결과 없음</div>';
            } else {
                dd.innerHTML = items.map(item =>
                    `<div class="search-item" onclick="selectAccount(this, '${item.code}', '${item.name.replace(/'/g,"\\'")}')">
                        <span class="code">${item.code}</span>
                        <span class="name">${item.name}</span>
                    </div>`
                ).join('');
            }
            dd.classList.add('show');
        }, 200);
    }

    function selectAccount(el, code, name) {
        const row = el.closest('tr') || el.closest('.search-input-wrap');
        const wrap = el.closest('.search-input-wrap');
        wrap.querySelector('.acct-search').value = `${code} ${name}`;
        wrap.querySelector('.acct-code').value = code;
        wrap.querySelector('.acct-dropdown').classList.remove('show');
    }

    // 드롭다운 외부 클릭 시 닫기
    document.addEventListener('click', e => {
        document.querySelectorAll('.search-dropdown.show').forEach(dd => {
            if (!dd.parentElement.contains(e.target)) dd.classList.remove('show');
        });
    });

    // ══════ 현재 폼 상태 추출 ══════

    function getCurrentForm() {
        const lines = [];
        for (const row of document.getElementById('linesBody').rows) {
            const code = row.querySelector('.acct-code')?.value;
            if (!code) continue;
            lines.push({
                account_code: code,
                account_name: row.querySelector('.acct-search')?.value || '',
                side: row.querySelector('.side-select')?.value || '차변',
                debit_amount: parseAmount(row.querySelector('.debit-input')?.value),
                credit_amount: parseAmount(row.querySelector('.credit-input')?.value),
            });
        }
        return { doc_type: document.getElementById('docType')?.value || '', description: document.getElementById('description')?.value || '', lines };
    }

    // ══════ 영수증 업로드 ══════

    const uz = document.getElementById('uploadZone');
    uz.addEventListener('dragover', e => { e.preventDefault(); uz.classList.add('dragover'); });
    uz.addEventListener('dragleave', () => uz.classList.remove('dragover'));
    uz.addEventListener('drop', e => { e.preventDefault(); uz.classList.remove('dragover'); if(e.dataTransfer.files.length>0){document.getElementById('receiptFile').files=e.dataTransfer.files; uploadReceipt(document.getElementById('receiptFile'));} });

    async function uploadReceipt(input) {
        if (!input.files||!input.files[0]) return;
        const fd = new FormData(); fd.append('file', input.files[0]);
        appendChat('user', `[영수증] ${input.files[0].name}`);

        // 로딩 표시
        const rd = document.getElementById('receiptResult');
        rd.style.display = 'block';
        rd.innerHTML = `<div style="text-align:center;padding:16px;color:var(--gray-500)">
            <div style="display:inline-block;width:24px;height:24px;border:3px solid var(--gray-200);border-top-color:var(--hoban-orange);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:8px"></div>
            <div style="font-size:13px">Gemini AI로 영수증 분석 중... (15~20초 소요)</div>
        </div>`;
        appendChat('ai', 'Gemini AI로 영수증을 분석하고 있습니다. 잠시 기다려주세요...');

        try {
            const res = await fetch('/api/receipt', {method:'POST', body:fd});
            const d = await res.json();
            if (d.success) {
                currentReceiptUrl = d.image_url;
                // OCR 데이터 저장
                ocrData = { date: d.date||null, vendor: d.vendor||null, amount: d.amount||null, raw: d.raw_text||null };

                // 분석 모드 표시
                const modeLabel = d.ocr_mode === 'llm_vision' ? 'Gemini AI' : d.ocr_mode === 'tesseract' ? 'Tesseract OCR' : '시뮬레이션';
                let ocrHtml = `<img src="${d.image_url}" class="receipt-preview">`;
                ocrHtml += `<div class="ocr-result"><span style="background:${d.ocr_mode==='llm_vision'?'#E8F5E9':'var(--gray-100)'};padding:1px 6px;border-radius:6px;font-size:10px;margin-right:4px">${modeLabel}</span><br>`;
                ocrHtml += `금액: <strong>${d.amount?Number(d.amount).toLocaleString()+'원':'-'}</strong>`;
                if(d.supply_amount) ocrHtml += ` (공급가: ${Number(d.supply_amount).toLocaleString()}, 부가세: ${Number(d.tax_amount||0).toLocaleString()})`;
                ocrHtml += `<br>거래처: ${d.vendor||'-'} / 일자: ${d.date||'-'}`;
                if(d.doc_type) ocrHtml += ` / 유형: ${d.doc_type}`;
                ocrHtml += `</div>`;
                rd.innerHTML = ocrHtml;

                let chatMsg = `영수증 분석 완료 <span style="background:#E8F5E9;padding:1px 6px;border-radius:6px;font-size:10px">${modeLabel}</span><br>`;
                chatMsg += `금액: <strong>${d.amount?Number(d.amount).toLocaleString()+'원':'-'}</strong><br>`;
                chatMsg += `거래처: ${d.vendor||'-'} / 일자: ${d.date||'-'}`;
                if(d.supply_amount) chatMsg += `<br>공급가: ${Number(d.supply_amount).toLocaleString()}원, 부가세: ${Number(d.tax_amount||0).toLocaleString()}원`;
                appendChat('ai', chatMsg);

                // LLM이 라인을 직접 생성한 경우 사용, 아니면 기본 2라인
                if (d.lines && d.lines.length > 0) {
                    fillFormLines(d.lines);
                } else {
                    const cc = d.suggested_credit_account||'2100303';
                    fillFormLines([
                        {account_code:d.suggested_account, debit_amount:d.amount, credit_amount:0, account_name:d.suggested_account_name, side:'차변'},
                        {account_code:cc, debit_amount:0, credit_amount:d.amount, account_name:accounts[cc]||cc, side:'대변'},
                    ]);
                }
                if(d.description) document.getElementById('description').value = d.description;
                if(d.date) document.getElementById('docDate').value = d.date;
                if(d.vendor) { document.getElementById('vendorSearch').value = d.vendor; }
            } else {
                rd.innerHTML = `<div style="color:var(--danger);font-size:13px;padding:8px">분석 실패: ${d.error || '알 수 없는 오류'}. 다시 시도해주세요.</div>`;
                appendChat('ai', `영수증 분석 실패: ${d.error || '알 수 없는 오류'}`);
            }
        } catch(e) {
            rd.innerHTML = `<div style="color:var(--danger);font-size:13px;padding:8px">네트워크 오류: ${e.message}</div>`;
            appendChat('ai', `업로드 오류: ${e.message}`);
            showToast('업로드 오류: ' + e.message, 'error');
        }
    }

    // ══════ 챗 ══════

    async function sendChat(text) {
        const input = document.getElementById('chatInput');
        const msg = text||input.value.trim(); if(!msg) return; input.value='';
        appendChat('user', msg);
        chatHistory.push({role:'user', content:msg});

        try {
            const res = await fetch('/api/chat', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ message:msg, history:chatHistory.slice(-10), current_form:getCurrentForm() })
            });
            const d = await res.json();

            // LLM 모드 표시
            const badge = document.getElementById('llmBadge');
            if(d.llm_mode==='claude'){badge.textContent='Claude AI';badge.style.background='#E8F5E9';badge.style.color='#43A047';}

            if (d.lines && d.lines.length > 0) {
                let h = `<strong>${d.message||'전표 반영 완료'}</strong><br>`;
                if(d.guide) h += `<div class="guide-box" style="margin-top:6px;font-size:12px">${d.guide}</div>`;
                appendChat('ai', h);
                fillFormLines(d.lines);
                if(d.description) document.getElementById('description').value = d.description;
                if(d.doc_type && d.doc_type !== '일반전표') document.getElementById('docType').value = d.doc_type;
            } else {
                appendChat('ai', (d.message||'').replace(/\n/g,'<br>'));
            }
            chatHistory.push({role:'assistant', content:d.message||''});
        } catch(e) { appendChat('ai','오류: '+e.message); }
    }

    function appendChat(role, html) {
        const b=document.getElementById('chatBox');
        const d=document.createElement('div'); d.className=`chat-msg ${role}`; d.innerHTML=html;
        b.appendChild(d); b.scrollTop=b.scrollHeight;
    }

    // ══════ 폼 조작 ══════

    function fillFormLines(lines) {
        const tb = document.getElementById('linesBody'); tb.innerHTML='';
        lines.forEach((l,i) => addLineWithData(i+1, l.account_code, l.debit_amount, l.credit_amount, l.account_name||'', l.side||'', l.description||''));
        updateTotal();
    }

    function addLineWithData(no, code, debit, credit, acctName, side, lineDesc) {
        const tb = document.getElementById('linesBody'); const tr = document.createElement('tr');
        const sideVal = side||(debit>0?'차변':'대변');
        const displayName = code ? `${code} ${acctName||accounts[code]||''}` : '';
        tr.innerHTML = `
            <td style="text-align:center;color:var(--gray-500)">${no||tb.rows.length+1}</td>
            <td><select class="side-select"><option ${sideVal==='차변'?'selected':''}>차변</option><option ${sideVal==='대변'?'selected':''}>대변</option></select></td>
            <td><div class="search-input-wrap"><input type="text" class="acct-search" value="${displayName}" placeholder="계정 검색..." autocomplete="off" oninput="searchAccount(this)" onfocus="searchAccount(this)"><input type="hidden" class="acct-code" value="${code||''}"><div class="search-dropdown acct-dropdown"></div></div></td>
            <td><input type="text" class="amt debit-input" value="${debit?Number(debit).toLocaleString():''}" placeholder="0" oninput="formatAmount(this);updateTotal()"></td>
            <td><input type="text" class="amt credit-input" value="${credit?Number(credit).toLocaleString():''}" placeholder="0" oninput="formatAmount(this);updateTotal()"></td>
            <td><input type="text" class="line-desc" value="${lineDesc}" placeholder="항목별 적요 (선택)"></td>
            <td><button class="btn btn-sm btn-outline" onclick="removeLine(this)" style="padding:3px 7px;font-size:12px">X</button></td>`;
        tb.appendChild(tr);
    }

    function addLine() { addLineWithData(0, '', 0, 0, '', '', ''); }
    function removeLine(btn) { const tb=document.getElementById('linesBody'); if(tb.rows.length>1){btn.closest('tr').remove(); renumberLines(); updateTotal();} }
    function renumberLines() { const rows=document.getElementById('linesBody').rows; for(let i=0;i<rows.length;i++) rows[i].cells[0].textContent=i+1; }
    function parseAmount(s) { if(!s) return 0; return parseInt(s.replace(/[^0-9-]/g,''))||0; }
    function formatAmount(i) { const v=parseAmount(i.value); if(v>0) i.value=v.toLocaleString(); else if(v<0) i.value=v.toLocaleString(); }
    function clearForm() { document.getElementById('description').value=''; document.getElementById('linesBody').innerHTML=''; addLine(); addLine(); updateTotal(); currentReceiptUrl=null; renumberLines(); }

    function updateTotal() {
        let td=0,tc=0;
        document.querySelectorAll('.debit-input').forEach(e=>td+=parseAmount(e.value));
        document.querySelectorAll('.credit-input').forEach(e=>tc+=parseAmount(e.value));
        document.getElementById('totalDebit').textContent=td.toLocaleString();
        document.getElementById('totalCredit').textContent=tc.toLocaleString();
        const s=document.getElementById('balanceStatus');
        if(td===tc&&td>0){s.className='balance-ok';s.textContent='V 차대 일치';}
        else if(td===0&&tc===0){s.className='';s.textContent='-';}
        else{s.className='balance-error';s.textContent=`X 불일치 (${Math.abs(td-tc).toLocaleString()})`;}
    }

    // ══════ 전표 저장 ══════

    async function submitJournal(skipOcrCheck) {
        const lines=[];
        for(const row of document.getElementById('linesBody').rows) {
            const code=row.querySelector('.acct-code')?.value; if(!code) continue;
            lines.push({
                account_code:code,
                account_name: (row.querySelector('.acct-search')?.value||'').replace(code,'').trim(),
                side:row.querySelector('.side-select').value,
                debit_amount:parseAmount(row.querySelector('.debit-input').value),
                credit_amount:parseAmount(row.querySelector('.credit-input').value),
                vendor_name:document.getElementById('vendorSearch').value,
                vendor_type:document.getElementById('vendorType').value,
                description:row.querySelector('.line-desc').value || document.getElementById('description').value,
            });
        }
        if(!lines.length){showToast('계정과목을 입력하세요.','error');return;}

        // OCR 불일치 경고 (영수증이 업로드된 경우)
        if (!skipOcrCheck && currentReceiptUrl && (ocrData.date || ocrData.vendor || ocrData.amount)) {
            const warnings = [];
            const formDate = document.getElementById('docDate').value;
            const formVendor = document.getElementById('vendorSearch').value.trim();
            let formAmount = 0;
            document.querySelectorAll('.debit-input').forEach(e => formAmount += parseAmount(e.value));

            if (ocrData.date && formDate && ocrData.date !== formDate) {
                warnings.push(`<tr><td style="font-weight:600">작성일자</td><td style="color:var(--danger)">${ocrData.date}</td><td>${formDate}</td></tr>`);
            }
            if (ocrData.vendor && formVendor && !formVendor.includes(ocrData.vendor) && !ocrData.vendor.includes(formVendor)) {
                warnings.push(`<tr><td style="font-weight:600">거래처</td><td style="color:var(--danger)">${ocrData.vendor}</td><td>${formVendor}</td></tr>`);
            }
            if (ocrData.amount && formAmount > 0 && Math.abs(ocrData.amount - formAmount) > 1) {
                warnings.push(`<tr><td style="font-weight:600">금액</td><td style="color:var(--danger)">${Number(ocrData.amount).toLocaleString()}원</td><td>${Number(formAmount).toLocaleString()}원</td></tr>`);
            }

            if (warnings.length > 0) {
                const html = `<div style="margin-bottom:12px;color:var(--danger);font-weight:600;font-size:15px">세금계산서/영수증 정보 불일치</div>
                    <p style="font-size:13px;color:var(--gray-600);margin-bottom:12px">OCR로 추출한 값과 입력한 값이 다릅니다. 확인 후 진행해주세요.</p>
                    <table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px">
                    <tr style="background:var(--gray-100)"><th style="padding:8px;text-align:left">항목</th><th style="padding:8px">OCR 추출값</th><th style="padding:8px">입력값</th></tr>
                    ${warnings.join('')}
                    </table>
                    <div style="display:flex;gap:8px;justify-content:flex-end">
                        <button class="btn btn-outline" onclick="document.getElementById('ocrWarningModal').style.display='none'">취소 (수정)</button>
                        <button class="btn btn-primary" onclick="document.getElementById('ocrWarningModal').style.display='none'; submitJournal(true)">확인 후 저장</button>
                    </div>`;
                let modal = document.getElementById('ocrWarningModal');
                if (!modal) {
                    modal = document.createElement('div');
                    modal.id = 'ocrWarningModal';
                    modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(57,55,53,0.6);backdrop-filter:blur(4px);z-index:300;display:flex;justify-content:center;align-items:center';
                    document.body.appendChild(modal);
                }
                modal.innerHTML = `<div style="background:white;border-radius:16px;padding:28px;max-width:500px;width:90%;box-shadow:0 25px 60px rgba(0,0,0,0.2)">${html}</div>`;
                modal.style.display = 'flex';
                return;
            }
        }

        const emp=document.getElementById('createdBy');
        const data={
            doc_date:document.getElementById('docDate').value,
            doc_type:document.getElementById('docType').value,
            category:document.getElementById('category').value,
            big_category:document.getElementById('bigCategory').value,
            description:document.getElementById('description').value,
            created_by:emp.value,
            department:emp.options[emp.selectedIndex].dataset.dept||'',
            project_id:document.getElementById('projectId').value||null,
            evidence_type:'',
            receipt_image:currentReceiptUrl,
            ocr_date: ocrData.date,
            ocr_vendor: ocrData.vendor,
            ocr_amount: ocrData.amount,
            ocr_raw: ocrData.raw,
            lines
        };
        try {
            const res=await fetch('/api/journal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
            const r=await res.json();
            if(r.success){
                showToast(`전표 ${r.doc_no} 저장 완료!`,'success');
                const ad=document.getElementById('aiResult'); const ai=r.ai_result;
                let h=`<h4>AI 분석 <span class="risk-badge ${ai.risk_level}">${ai.risk_level}</span></h4>`;
                if(ai.reasons&&ai.reasons.length>0){h+='<div>';ai.reasons.forEach(r=>{h+=`<div class="reason-item">${r}</div>`;});h+='</div>';
                    if(ai.recommendations&&ai.recommendations.length>0){h+='<div class="recommendation"><strong>권고:</strong><br>';ai.recommendations.forEach(r=>h+=`- ${r}<br>`);h+='</div>';}
                } else h+='<div style="color:var(--success);margin-top:8px">정상 전표입니다.</div>';
                ad.innerHTML=h; ad.style.display='block';
            }
        } catch(e){showToast('저장 오류','error');}
    }

    function showToast(m,t){const e=document.getElementById('toast');e.textContent=m;e.className=`toast show ${t||''}`;setTimeout(()=>e.className='toast',3000);}
    </script>
</body>
</html>
